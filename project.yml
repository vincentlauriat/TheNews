name: TheNews
options:
  bundleIdPrefix: com.example
  deploymentTarget:
    macOS: "14.0"
    iOS: "17.0"

# Sparkle : auto-update macOS uniquement (iOS/watchOS/tvOS restent hors de son
# périmètre — pas de distribution directe hors App Store sur ces plateformes).
packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.9.1"

# Schemes explicites (sinon xcodegen n'en génère pas → schemes perdus à chaque régénération).
schemes:
  TheNews:
    build:
      targets:
        TheNews: all
    test:
      targets:
        - TheNewsTests
    run:
      config: Debug
  TheNewsiOS:
    build:
      targets:
        TheNewsiOS: all
    run:
      config: Debug
  TheNewsWatch:
    build:
      targets:
        TheNewsWatch: all
    run:
      config: Debug
  TheNewsTV:
    build:
      targets:
        TheNewsTV: all
    run:
      config: Debug
  TheNewsScreenSaver:
    build:
      targets:
        TheNewsScreenSaver: all

targets:
  # ---------------------------------------------------------------------------
  # macOS
  # ---------------------------------------------------------------------------
  TheNews:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: TheNews
        excludes:
          - "**/*.entitlements"
          - "Info.plist"
          - "Info-iOS.plist"
          - "**/.omc/**"
    settings:
      base:
        PRODUCT_NAME: TheNews
        PRODUCT_BUNDLE_IDENTIFIER: fr.vincentlauriat.thenews
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SWIFT_VERSION: "5.9"
        MARKETING_VERSION: "1.3.1"
        CURRENT_PROJECT_VERSION: "1"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        CODE_SIGN_ENTITLEMENTS: TheNews/TheNews.entitlements
        # Signature dev automatique (team KFLACS69T9) : requise pour activer CloudKit
        # sur macOS. Le provisioning iCloud est créé via -allowProvisioningUpdates.
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: KFLACS69T9
    dependencies:
      - target: TheNewsWidgetMac
        embed: true
      - target: TheNewsScreenSaver
        embed: false
        link: false
      - package: Sparkle
    # Le screensaver voyage avec l'app (cf. PLAN.md § Phase G) : la dépendance ci-dessus force
    # xcodegen à builder TheNewsScreenSaver avant TheNews, ce script copie ensuite le .saver
    # construit dans les Resources de l'app. ScreenSaverInstaller (au runtime) se charge de
    # l'installer/mettre à jour dans ~/Library/Screen Savers/ au lancement.
    postbuildScripts:
      - name: "Embarquer le screensaver dans Resources"
        script: |
          set -e
          SAVER_NAME="TheNewsBriefing.saver"
          SRC="${BUILT_PRODUCTS_DIR}/${SAVER_NAME}"
          DST="${BUILT_PRODUCTS_DIR}/${PRODUCT_NAME}.app/Contents/Resources/${SAVER_NAME}"
          rm -rf "${DST}"
          ditto "${SRC}" "${DST}"
    info:
      path: TheNews/Info.plist
      properties:
        CFBundleName: TheNews
        CFBundleDisplayName: TheNews
        CFBundleIdentifier: fr.vincentlauriat.thenews
        # Sparkle (auto-update). Clé publique du compte trousseau "TheNews" —
        # NE JAMAIS régénérer (voir l'avertissement en tête de Scripts/release.sh).
        SUFeedURL: "https://raw.githubusercontent.com/vincentlauriat/TheNews/main/appcast.xml"
        SUPublicEDKey: "j665v9PJTV2rJXq9JJay5Ze4bUp46VIknS1itkuJu0w="
        SUEnableAutomaticChecks: true
        SUScheduledCheckInterval: 86400
        SUAutomaticallyUpdate: false
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        LSMinimumSystemVersion: "14.0"
        NSHumanReadableCopyright: ""

  # ---------------------------------------------------------------------------
  # Tests unitaires — hébergés dans l'app macOS (`@testable import TheNews`).
  # Ciblent les fonctions pures à risque de régression silencieuse (parsing RSS,
  # matching de mots-clés, dédup cross-source, post-traitement déterministe du
  # digest IA) plutôt que de l'UI testing. Cf. `PLAN.md` § Corrections & dette
  # technique (2026-07-11).
  # ---------------------------------------------------------------------------
  TheNewsTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: TheNewsTests
    settings:
      base:
        PRODUCT_NAME: TheNewsTests
        PRODUCT_BUNDLE_IDENTIFIER: fr.vincentlauriat.thenews.tests
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        GENERATE_INFOPLIST_FILE: YES
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: KFLACS69T9
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/TheNews.app/Contents/MacOS/TheNews"
        BUNDLE_LOADER: "$(TEST_HOST)"
    dependencies:
      - target: TheNews

  # ---------------------------------------------------------------------------
  # iOS / iPadOS — codebase partagé avec la cible macOS
  # ---------------------------------------------------------------------------
  TheNewsiOS:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: TheNews
        excludes:
          - "**/*.entitlements"
          - "Info.plist"
          - "Info-iOS.plist"
          - "**/.omc/**"
    settings:
      base:
        PRODUCT_NAME: TheNews
        PRODUCT_BUNDLE_IDENTIFIER: fr.vincentlauriat.thenews
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SWIFT_VERSION: "5.9"
        MARKETING_VERSION: "1.3.1"
        CURRENT_PROJECT_VERSION: "1"
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
        TARGETED_DEVICE_FAMILY: "1,2"
        # Signature automatique (compte Apple de Vincent, team KFLACS69T9).
        # Xcode crée/télécharge le provisioning profile via -allowProvisioningUpdates.
        # Le build de vérification simulateur passe CODE_SIGNING_ALLOWED=NO en argument.
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: KFLACS69T9
        CODE_SIGN_ENTITLEMENTS: TheNews/TheNews-iOS.entitlements
    dependencies:
      - target: TheNewsWidgetExtension
        embed: true
      - target: TheNewsWatch
        embed: true
    info:
      path: TheNews/Info-iOS.plist
      properties:
        CFBundleName: TheNews
        CFBundleDisplayName: TheNews
        CFBundleIdentifier: fr.vincentlauriat.thenews
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        UILaunchScreen: {}
        # Rafraîchissement en tâche de fond + notifications de veille (phase 4).
        UIBackgroundModes:
          - fetch
          - processing
          - remote-notification
        BGTaskSchedulerPermittedIdentifiers:
          - fr.vincentlauriat.thenews.refresh
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight

  # ---------------------------------------------------------------------------
  # Widget (iOS) — extension WidgetKit, lit l'instantané via l'App Group
  # ---------------------------------------------------------------------------
  TheNewsWidgetExtension:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: TheNewsWidget
        excludes:
          - "**/*.entitlements"
      - path: TheNews/Shared/WidgetSnapshot.swift   # modèle partagé app ↔ widget
    settings:
      base:
        PRODUCT_NAME: TheNewsWidget
        PRODUCT_BUNDLE_IDENTIFIER: fr.vincentlauriat.thenews.widget
        SWIFT_VERSION: "5.9"
        MARKETING_VERSION: "1.3.1"
        CURRENT_PROJECT_VERSION: "1"
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
        TARGETED_DEVICE_FAMILY: "1,2"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: KFLACS69T9
        CODE_SIGN_ENTITLEMENTS: TheNewsWidget/TheNewsWidget.entitlements
    info:
      path: TheNewsWidget/Info.plist
      properties:
        CFBundleName: TheNewsWidget
        CFBundleDisplayName: TheNews
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension

  # ---------------------------------------------------------------------------
  # Widget (macOS) — même code widget, embarqué dans l'app macOS
  # ---------------------------------------------------------------------------
  TheNewsWidgetMac:
    type: app-extension
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: TheNewsWidget
        excludes:
          - "**/*.entitlements"
      - path: TheNews/Shared/WidgetSnapshot.swift
    settings:
      base:
        PRODUCT_NAME: TheNewsWidgetMac
        PRODUCT_BUNDLE_IDENTIFIER: fr.vincentlauriat.thenews.macwidget
        SWIFT_VERSION: "5.9"
        MARKETING_VERSION: "1.3.1"
        CURRENT_PROJECT_VERSION: "1"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: KFLACS69T9
        CODE_SIGN_ENTITLEMENTS: TheNewsWidget/TheNewsWidgetMac.entitlements
    info:
      path: TheNewsWidget/Info-mac.plist
      properties:
        CFBundleName: TheNewsWidgetMac
        CFBundleDisplayName: TheNews
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension

  # ---------------------------------------------------------------------------
  # Apple Watch — app watchOS autonome, embarquée dans l'app iOS
  # ---------------------------------------------------------------------------
  TheNewsWatch:
    type: application
    platform: watchOS
    deploymentTarget: "10.0"
    sources:
      - path: TheNewsWatch
      - path: TheNews/Models/Source.swift       # partagés (catalogue + RSS)
      - path: TheNews/Models/Feed.swift
      - path: TheNews/Services/RSSService.swift
      - path: TheNews/Services/RSSParser.swift
    settings:
      base:
        PRODUCT_NAME: TheNews
        PRODUCT_BUNDLE_IDENTIFIER: fr.vincentlauriat.thenews.watchkitapp
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SWIFT_VERSION: "5.9"
        MARKETING_VERSION: "1.3.1"
        CURRENT_PROJECT_VERSION: "1"
        WATCHOS_DEPLOYMENT_TARGET: "10.0"
        TARGETED_DEVICE_FAMILY: "4"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: KFLACS69T9
    info:
      path: TheNewsWatch/Info.plist
      properties:
        CFBundleDisplayName: TheNews
        WKApplication: true
        WKCompanionAppBundleIdentifier: fr.vincentlauriat.thenews
        UILaunchScreen: {}

  # ---------------------------------------------------------------------------
  # Apple TV — app tvOS autonome (lite : fetch RSS direct, pas de sync iCloud ;
  # cf. PLAN.md Phase E1/E2). Pas d'icône layered/Top Shelf pour l'instant
  # (chantier de polish séparé, non bloquant pour le build).
  # ---------------------------------------------------------------------------
  TheNewsTV:
    type: application
    platform: tvOS
    deploymentTarget: "17.0"
    sources:
      - path: TheNewsTV
        excludes:
          - "**/.omc/**"
          - "**/*.entitlements"
      - path: TheNews/Models/Source.swift       # partagés (catalogue + RSS + persistance)
      - path: TheNews/Models/Feed.swift
      - path: TheNews/Models/Article.swift
      - path: TheNews/Models/FeedSubscription.swift
      - path: TheNews/Models/CustomFeed.swift
      - path: TheNews/Models/WatchTopic.swift
      - path: TheNews/Services/RSSService.swift
      - path: TheNews/Services/RSSParser.swift
      - path: TheNews/Services/FeedStore.swift
      - path: TheNews/Services/SubscriptionStore.swift
      - path: TheNews/Services/CustomFeedStore.swift
      - path: TheNews/Services/BriefingEngine.swift
      - path: TheNews/Services/RelatedArticlesEngine.swift
      - path: TheNews/Services/MatchingEngine.swift
    settings:
      base:
        PRODUCT_NAME: TheNewsTV
        PRODUCT_BUNDLE_IDENTIFIER: fr.vincentlauriat.thenews.tvos
        ASSETCATALOG_COMPILER_APPICON_NAME: "App Icon & Top Shelf Image"
        SWIFT_VERSION: "5.9"
        MARKETING_VERSION: "1.3.1"
        CURRENT_PROJECT_VERSION: "1"
        TVOS_DEPLOYMENT_TARGET: "17.0"
        CODE_SIGN_ENTITLEMENTS: TheNewsTV/TheNewsTV.entitlements
        # Signature dev automatique (team KFLACS69T9) : requise pour activer CloudKit,
        # comme sur macOS/iOS (Phase E2 — mêmes abonnements/favoris/flux perso).
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: KFLACS69T9
    info:
      path: TheNewsTV/Info.plist
      properties:
        CFBundleDisplayName: TheNews
        UILaunchScreen: {}

  # ---------------------------------------------------------------------------
  # Écran de veille macOS — bundle .saver, hors app principale (installation
  # manuelle dans ~/Library/Screen Savers). Autonome : fetch RSS direct comme
  # TheNewsWatch/TV, pas d'accès à SwiftData/CloudKit ni à l'App Group de l'app —
  # le host système `legacyScreenSaver` (macOS Sequoia+) bloque silencieusement
  # les App Group tiers (« App Group Container Protection », host non interactif
  # qui ne peut pas répondre au prompt système que ça exigerait). Constaté par
  # diagnostic (logs unifiés) le 2026-07-07 ; cf. CHANGES.md.
  # ---------------------------------------------------------------------------
  TheNewsScreenSaver:
    type: bundle
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: TheNewsScreenSaver
        excludes:
          - "**/*.entitlements"
          - "Info.plist"
      - path: TheNews/Shared/WidgetSnapshot.swift   # AppGroup.id inutilisé ici, mais JSONEncoder/Decoder.iso
      - path: TheNews/Shared/BriefingSnapshot.swift  # BriefingSnapshotArticle : modèle d'affichage réutilisé
      - path: TheNews/Models/Source.swift
      - path: TheNews/Models/Feed.swift
      - path: TheNews/Services/RSSService.swift
      - path: TheNews/Services/RSSParser.swift
    settings:
      base:
        PRODUCT_NAME: TheNewsBriefing
        PRODUCT_BUNDLE_IDENTIFIER: fr.vincentlauriat.thenews.screensaver
        WRAPPER_EXTENSION: saver
        SWIFT_VERSION: "5.9"
        MARKETING_VERSION: "1.3.1"
        CURRENT_PROJECT_VERSION: "1"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: KFLACS69T9
        CODE_SIGN_ENTITLEMENTS: TheNewsScreenSaver/TheNewsScreenSaver.entitlements
        SKIP_INSTALL: NO
    info:
      path: TheNewsScreenSaver/Info.plist
      properties:
        CFBundleExecutable: "$(EXECUTABLE_NAME)"
        CFBundleName: TheNews Briefing
        CFBundleDisplayName: TheNews Briefing
        CFBundlePackageType: BNDL
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        NSPrincipalClass: NewsScreenSaverView
        NSHumanReadableCopyright: ""
